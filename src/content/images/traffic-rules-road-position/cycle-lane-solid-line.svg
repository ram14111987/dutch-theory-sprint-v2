<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-labelledby="title">
  <title id="title">A cycle lane bordered by a solid white line is reserved for cyclists and may not be entered by motor vehicles</title>
  <rect width="480" height="200" fill="#f4f6fa"/>
  <rect x="0" y="40" width="360" height="120" fill="#dfe7f5"/>
  <rect x="360" y="40" width="120" height="120" fill="#b71c1c" opacity="0.18"/>
  <line x1="360" y1="40" x2="360" y2="160" stroke="#ffffff" stroke-width="5"/>
  <circle cx="420" cy="130" r="11" fill="none" stroke="#2e7d32" stroke-width="3"/>
  <circle cx="420" cy="92" r="6" fill="#c62828"/>
  <text x="420" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#c62828">bike only</text>
  <rect x="120" y="80" width="50" height="30" rx="5" fill="#1565c0"/>
  <rect x="128" y="84" width="34" height="11" rx="2" fill="#bfdbfe"/>
  <path d="M170 95 L300 95" fill="none" stroke="#1565c0" stroke-width="3"/>
  <path d="M300 95 L288 89 M300 95 L288 101" fill="none" stroke="#1565c0" stroke-width="3"/>
  <line x1="345" y1="80" x2="345" y2="120" stroke="#c62828" stroke-width="4"/>
  <text x="50" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#222">Solid white line — cars must not enter</text>
</svg>
