<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" role="img" aria-labelledby="title">
  <title id="title">Another car overtaking yours on a two-lane country road; you hold your line and ease off the accelerator rather than speeding up</title>
  <rect width="480" height="260" fill="#f4f6fa"/>
  <rect x="160" y="0" width="160" height="260" fill="#dfe7f5"/>
  <line x1="240" y1="0" x2="240" y2="260" stroke="#ffffff" stroke-width="2" stroke-dasharray="10 10"/>
  <g id="you">
    <rect x="252" y="150" width="36" height="50" rx="6" fill="#1565c0"/>
    <text x="270" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">YOU</text>
    <text x="332" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#33415c">hold line</text>
    <text x="332" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#33415c">ease off</text>
  </g>
  <g id="overtaker">
    <rect x="192" y="80" width="36" height="50" rx="6" fill="#ef6c00"/>
    <path d="M210 150 L210 70" fill="none" stroke="#ef6c00" stroke-width="3" stroke-dasharray="6 5"/>
    <path d="M210 70 L204 82 M210 70 L216 82" fill="none" stroke="#ef6c00" stroke-width="3"/>
  </g>
  <text x="110" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#d32f2f">do not accelerate</text>
</svg>
