<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" role="img" aria-labelledby="title">
  <title id="title">A three-lane motorway in your direction with light traffic; your car keeps to the right lane, the left and middle lanes reserved for overtaking</title>
  <rect width="480" height="260" fill="#f4f6fa"/>
  <rect x="120" y="0" width="240" height="260" fill="#dfe7f5"/>
  <line x1="200" y1="0" x2="200" y2="260" stroke="#ffffff" stroke-width="2" stroke-dasharray="10 10"/>
  <line x1="280" y1="0" x2="280" y2="260" stroke="#ffffff" stroke-width="2" stroke-dasharray="10 10"/>
  <line x1="120" y1="0" x2="120" y2="260" stroke="#ffffff" stroke-width="5"/>
  <line x1="360" y1="0" x2="360" y2="260" stroke="#ffffff" stroke-width="5"/>
  <g id="you">
    <rect x="302" y="150" width="36" height="50" rx="6" fill="#1565c0"/>
    <text x="320" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">YOU</text>
  </g>
  <text x="160" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#33415c">overtaking</text>
  <text x="240" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#33415c">overtaking</text>
  <text x="320" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#1565c0">keep right</text>
</svg>
