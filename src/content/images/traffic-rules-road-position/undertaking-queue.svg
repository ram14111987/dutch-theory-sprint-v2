<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" role="img" aria-labelledby="title">
  <title id="title">A motorway in dense traffic where the left lane is queued and moving slowly while your right-hand lane moves faster; passing on the right is allowed in this situation</title>
  <rect width="480" height="260" fill="#f4f6fa"/>
  <rect x="140" y="0" width="200" height="260" fill="#dfe7f5"/>
  <line x1="240" y1="0" x2="240" y2="260" stroke="#ffffff" stroke-width="2" stroke-dasharray="10 10"/>
  <line x1="140" y1="0" x2="140" y2="260" stroke="#ffffff" stroke-width="4"/>
  <line x1="340" y1="0" x2="340" y2="260" stroke="#ffffff" stroke-width="4"/>
  <g id="left-queue">
    <rect x="172" y="30" width="36" height="46" rx="6" fill="#ef6c00"/>
    <rect x="172" y="92" width="36" height="46" rx="6" fill="#ef6c00"/>
    <rect x="172" y="154" width="36" height="46" rx="6" fill="#ef6c00"/>
    <text x="190" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#33415c">slow queue</text>
  </g>
  <g id="you">
    <rect x="272" y="150" width="36" height="50" rx="6" fill="#1565c0"/>
    <text x="290" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">YOU</text>
    <path d="M290 150 L290 70" fill="none" stroke="#1565c0" stroke-width="3" stroke-dasharray="6 5"/>
    <path d="M290 70 L284 82 M290 70 L296 82" fill="none" stroke="#1565c0" stroke-width="3"/>
    <text x="290" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#1565c0">moves faster</text>
  </g>
  <text x="290" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#33415c">allowed in dense traffic</text>
</svg>
