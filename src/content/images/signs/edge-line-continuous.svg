<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" role="img" aria-labelledby="title">
  <title id="title">A continuous solid white line at the outer edge of the carriageway; the hatched strip beyond it is not a driving lane</title>
  <rect width="480" height="260" fill="#f4f6fa"/>
  <rect x="120" y="0" width="200" height="260" fill="#dfe7f5"/>
  <line x1="220" y1="0" x2="220" y2="260" stroke="#ffffff" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="300" y1="0" x2="300" y2="260" stroke="#ffffff" stroke-width="6"/>
  <g id="beyond" stroke="#9aa7c2" stroke-width="2">
    <line x1="304" y1="20" x2="316" y2="8"/>
    <line x1="304" y1="60" x2="316" y2="48"/>
    <line x1="304" y1="100" x2="316" y2="88"/>
    <line x1="304" y1="140" x2="316" y2="128"/>
    <line x1="304" y1="180" x2="316" y2="168"/>
    <line x1="304" y1="220" x2="316" y2="208"/>
  </g>
  <g id="you">
    <rect x="240" y="150" width="36" height="50" rx="6" fill="#1565c0"/>
    <text x="258" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">YOU</text>
  </g>
  <text x="360" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#33415c">not a lane</text>
  <text x="160" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#33415c">edge of carriageway</text>
</svg>
