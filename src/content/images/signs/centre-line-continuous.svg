<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" role="img" aria-labelledby="title">
  <title id="title">A two-way road with a continuous solid white centre line that may not be crossed or straddled</title>
  <rect width="480" height="260" fill="#f4f6fa"/>
  <rect x="160" y="0" width="160" height="260" fill="#dfe7f5"/>
  <line x1="240" y1="0" x2="240" y2="260" stroke="#ffffff" stroke-width="6"/>
  <g id="you">
    <rect x="178" y="150" width="36" height="50" rx="6" fill="#1565c0"/>
    <text x="196" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">YOU</text>
  </g>
  <g id="no-cross">
    <path d="M214 130 L266 110" fill="none" stroke="#d32f2f" stroke-width="3"/>
    <path d="M266 110 L256 108 M266 110 L262 120" fill="none" stroke="#d32f2f" stroke-width="3"/>
    <line x1="232" y1="118" x2="248" y2="102" stroke="#d32f2f" stroke-width="3"/>
  </g>
  <text x="240" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#d32f2f">Do not cross the solid line</text>
</svg>
