<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" role="img" aria-labelledby="title">
  <title id="title">A pedestrian holding a white cane with red bands is deaf-blind and needs extra time to cross</title>
  <rect width="320" height="240" fill="#f4f6fa"/>
  <circle cx="150" cy="56" r="20" fill="#90a4ae"/>
  <rect x="132" y="78" width="36" height="70" rx="10" fill="#455a64"/>
  <rect x="138" y="146" width="12" height="60" rx="5" fill="#37474f"/>
  <rect x="150" y="146" width="12" height="60" rx="5" fill="#37474f"/>
  <rect x="166" y="84" width="10" height="60" rx="4" fill="#90a4ae"/>
  <line x1="176" y1="120" x2="232" y2="200" stroke="#ffffff" stroke-width="6"/>
  <rect x="190" y="138" width="10" height="14" fill="#c62828" transform="rotate(35 195 145)"/>
  <rect x="210" y="166" width="10" height="14" fill="#c62828" transform="rotate(35 215 173)"/>
  <text x="160" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#222">White cane + red bands = deaf-blind</text>
</svg>
