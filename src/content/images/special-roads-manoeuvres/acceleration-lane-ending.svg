<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-labelledby="title">
  <title id="title">A car on a short acceleration lane matches speed and merges into a gap before the lane ends in 80 metres</title>
  <rect width="480" height="200" fill="#f4f6fa"/>
  <rect x="0" y="40" width="480" height="56" fill="#dfe7f5"/>
  <line x1="0" y1="68" x2="480" y2="68" stroke="#ffffff" stroke-width="2" stroke-dasharray="14 10"/>
  <path d="M0 150 L360 150 L460 96 L480 96" fill="#cfe0d6"/>
  <line x1="0" y1="96" x2="360" y2="96" stroke="#ffffff" stroke-width="2" stroke-dasharray="14 10"/>
  <rect x="40" y="48" width="44" height="22" rx="4" fill="#90a4ae"/>
  <rect x="150" y="48" width="44" height="22" rx="4" fill="#90a4ae"/>
  <rect x="270" y="48" width="44" height="22" rx="4" fill="#90a4ae"/>
  <rect x="100" y="118" width="46" height="24" rx="5" fill="#1565c0"/>
  <rect x="108" y="122" width="30" height="9" rx="2" fill="#bfdbfe"/>
  <path d="M148 130 L210 100" fill="none" stroke="#1565c0" stroke-width="3" stroke-dasharray="6 5"/>
  <path d="M210 100 L198 100 M210 100 L206 111" fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="225" y="138" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#d32f2f">80 m left — merge</text>
  <text x="60" y="34" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#222">Motorway lane (100 km/h)</text>
  <text x="20" y="170" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">Acceleration lane ends</text>
</svg>
