<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" role="img" aria-labelledby="title">
  <title id="title">A T-junction with a five-metre no-parking zone marked on each side of the corner; the legal parked car sits beyond the 5 metre limit</title>
  <rect width="480" height="260" fill="#f4f6fa"/>
  <rect x="0" y="100" width="480" height="70" fill="#dfe7f5"/>
  <rect x="200" y="170" width="80" height="90" fill="#dfe7f5"/>
  <line x1="0" y1="135" x2="200" y2="135" stroke="#ffffff" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="280" y1="135" x2="480" y2="135" stroke="#ffffff" stroke-width="2" stroke-dasharray="8 8"/>
  <g id="no-park-zone">
    <rect x="120" y="100" width="80" height="35" fill="#f3c6c0" opacity="0.7"/>
    <line x1="120" y1="135" x2="200" y2="135" stroke="#d32f2f" stroke-width="2"/>
    <text x="160" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#d32f2f">5 m — no parking</text>
  </g>
  <g id="legal-car">
    <rect x="40" y="105" width="50" height="26" rx="5" fill="#1565c0"/>
    <text x="65" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">OK</text>
  </g>
  <text x="240" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#33415c">keep at least 5 m clear of the junction</text>
</svg>
