<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" role="img" aria-labelledby="title">
  <title id="title">A zebra pedestrian crossing with a five-metre no-stopping zone marked before it; a car must stop no closer than 5 metres ahead of the crossing</title>
  <rect width="480" height="260" fill="#f4f6fa"/>
  <rect x="0" y="80" width="480" height="100" fill="#dfe7f5"/>
  <line x1="0" y1="130" x2="480" y2="130" stroke="#ffffff" stroke-width="2" stroke-dasharray="14 12"/>
  <g id="zebra" fill="#ffffff">
    <rect x="300" y="84" width="18" height="92"/>
    <rect x="330" y="84" width="18" height="92"/>
    <rect x="360" y="84" width="18" height="92"/>
    <rect x="390" y="84" width="18" height="92"/>
  </g>
  <text x="354" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#33415c">zebra crossing</text>
  <g id="zone">
    <rect x="150" y="135" width="150" height="40" fill="#f3c6c0" opacity="0.7"/>
    <line x1="150" y1="175" x2="300" y2="175" stroke="#d32f2f" stroke-width="2"/>
    <text x="225" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#d32f2f">5 m — no stopping</text>
  </g>
  <g id="you">
    <rect x="90" y="135" width="50" height="28" rx="6" fill="#1565c0"/>
    <text x="115" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">YOU</text>
  </g>
  <text x="240" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#33415c">Do not stop within 5 m before the crossing</text>
</svg>
