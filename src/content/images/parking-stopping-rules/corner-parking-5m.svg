<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" role="img" aria-labelledby="title">
  <title id="title">Parking is forbidden within five metres of a junction corner, so parking four metres from it is not allowed</title>
  <rect width="480" height="240" fill="#f4f6fa"/>
  <rect x="0" y="150" width="480" height="60" fill="#dfe7f5"/>
  <rect x="200" y="0" width="60" height="240" fill="#dfe7f5"/>
  <line x1="0" y1="180" x2="200" y2="180" stroke="#ffffff" stroke-width="2" stroke-dasharray="12 8"/>
  <line x1="260" y1="180" x2="480" y2="180" stroke="#ffffff" stroke-width="2" stroke-dasharray="12 8"/>
  <line x1="230" y1="0" x2="230" y2="150" stroke="#ffffff" stroke-width="2" stroke-dasharray="12 8"/>
  <rect x="120" y="156" width="76" height="2" fill="none"/>
  <line x1="200" y1="150" x2="200" y2="210" stroke="#c62828" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="120" y1="150" x2="120" y2="210" stroke="#2e7d32" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="120" y1="138" x2="200" y2="138" stroke="#c62828" stroke-width="2"/>
  <path d="M120 138 L128 134 M120 138 L128 142" stroke="#c62828" stroke-width="2" fill="none"/>
  <path d="M200 138 L192 134 M200 138 L192 142" stroke="#c62828" stroke-width="2" fill="none"/>
  <text x="160" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#c62828">5 m no-parking zone</text>
  <rect x="138" y="166" width="46" height="26" rx="5" fill="#90a4ae" stroke="#d32f2f" stroke-width="2"/>
  <line x1="142" y1="170" x2="180" y2="188" stroke="#d32f2f" stroke-width="2"/>
  <line x1="180" y1="170" x2="142" y2="188" stroke="#d32f2f" stroke-width="2"/>
  <text x="161" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#222">parked at 4 m = inside zone</text>
</svg>
