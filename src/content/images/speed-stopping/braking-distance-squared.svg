<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-labelledby="title">
  <title id="title">Braking distance rises with the square of speed, so doubling speed from 50 to 100 km/h quadruples it from 14 to 56 metres</title>
  <rect width="480" height="200" fill="#f4f6fa"/>
  <text x="240" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#222">Braking distance grows with speed squared</text>
  <text x="40" y="74" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#222">50 km/h</text>
  <rect x="120" y="58" width="80" height="26" fill="#1565c0"/>
  <text x="160" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">14 m</text>
  <text x="40" y="138" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#222">100 km/h</text>
  <rect x="120" y="122" width="320" height="26" fill="#1565c0"/>
  <text x="280" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">56 m  (= 14 × 4)</text>
  <text x="240" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#d32f2f">Double the speed = 4× the braking distance</text>
</svg>
