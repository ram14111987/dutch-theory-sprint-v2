<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" role="img" aria-labelledby="title">
  <title id="title">A car turning left at a junction must give way to an oncoming car going straight ahead</title>
  <rect width="480" height="260" fill="#f4f6fa"/>
  <rect x="200" y="0" width="80" height="260" fill="#dfe7f5"/>
  <rect x="0" y="100" width="480" height="60" fill="#dfe7f5"/>
  <line x1="240" y1="0" x2="240" y2="100" stroke="#ffffff" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="240" y1="160" x2="240" y2="260" stroke="#ffffff" stroke-width="2" stroke-dasharray="8 8"/>
  <g id="you">
    <rect x="222" y="200" width="36" height="50" rx="6" fill="#1565c0"/>
    <path d="M240 200 L240 150 L150 130" fill="none" stroke="#1565c0" stroke-width="3" stroke-dasharray="6 5"/>
    <path d="M150 130 L162 124 M150 130 L160 140" fill="none" stroke="#1565c0" stroke-width="3"/>
    <text x="240" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">YOU</text>
  </g>
  <g id="oncoming">
    <rect x="222" y="10" width="36" height="50" rx="6" fill="#ef6c00"/>
    <path d="M240 60 L240 130" fill="none" stroke="#ef6c00" stroke-width="3"/>
    <path d="M240 130 L234 118 M240 130 L246 118" fill="none" stroke="#ef6c00" stroke-width="3"/>
  </g>
  <text x="370" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#d32f2f">Give way to oncoming</text>
</svg>
