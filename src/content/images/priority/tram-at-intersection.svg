<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-label="Top-down view of an intersection with a tram approaching from the left">
  <title>Tram at intersection</title>
  <!-- background -->
  <rect width="260" height="260" fill="#f8fafc"/>
  <!-- corner pavement blocks -->
  <rect x="0"   y="0"   width="95"  height="95"  fill="#e2e8f0"/>
  <rect x="165" y="0"   width="95"  height="95"  fill="#e2e8f0"/>
  <rect x="0"   y="165" width="95"  height="95"  fill="#e2e8f0"/>
  <rect x="165" y="165" width="95"  height="95"  fill="#e2e8f0"/>
  <!-- road surfaces -->
  <rect x="95"  y="0"   width="70"  height="260" fill="#94a3b8"/>
  <rect x="0"   y="95"  width="260" height="70"  fill="#94a3b8"/>
  <!-- tram tracks on horizontal road -->
  <line x1="0" y1="116" x2="260" y2="116" stroke="#475569" stroke-width="2"/>
  <line x1="0" y1="144" x2="260" y2="144" stroke="#475569" stroke-width="2"/>
  <!-- track tie marks -->
  <line x1="14"  y1="116" x2="14"  y2="144" stroke="#475569" stroke-width="1.5"/>
  <line x1="32"  y1="116" x2="32"  y2="144" stroke="#475569" stroke-width="1.5"/>
  <line x1="50"  y1="116" x2="50"  y2="144" stroke="#475569" stroke-width="1.5"/>
  <line x1="68"  y1="116" x2="68"  y2="144" stroke="#475569" stroke-width="1.5"/>
  <!-- centre dashes — vertical road only -->
  <line x1="130" y1="10"  x2="130" y2="88"  stroke="#fff" stroke-width="2" stroke-dasharray="10 8"/>
  <line x1="130" y1="172" x2="130" y2="250" stroke="#fff" stroke-width="2" stroke-dasharray="10 8"/>

  <!-- TRAM: amber, heading east (right), coming from the left -->
  <rect x="8"  y="107" width="64" height="46" rx="4" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <!-- tram windows -->
  <rect x="12" y="111" width="18" height="10" rx="2" fill="#fef9c3"/>
  <rect x="12" y="133" width="18" height="10" rx="2" fill="#fef9c3"/>
  <rect x="34" y="111" width="18" height="10" rx="2" fill="#fef9c3"/>
  <rect x="34" y="133" width="18" height="10" rx="2" fill="#fef9c3"/>
  <!-- direction arrowhead pointing right -->
  <polygon points="80,130 68,119 68,141" fill="#d97706"/>
  <!-- TRAM label below -->
  <text x="40" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e" font-family="Arial,Helvetica,sans-serif">TRAM</text>
  <!-- priority badge -->
  <circle cx="38" cy="89" r="13" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <text x="38" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#78350f" font-family="Arial,Helvetica,sans-serif">!</text>
  <text x="38" y="77" text-anchor="middle" font-size="8" fill="#78350f" font-family="Arial,Helvetica,sans-serif">PRIORITY</text>

  <!-- YOUR CAR: blue, heading north (up) -->
  <rect x="108" y="193" width="44" height="26" rx="4" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="116" y="197" width="28" height="10" rx="2" fill="#bfdbfe"/>
  <polygon points="130,174 116,195 144,195" fill="#1d4ed8"/>
  <text x="130" y="254" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b" font-family="Arial,Helvetica,sans-serif">YOU</text>

  <text x="130" y="14" text-anchor="middle" font-size="9" fill="#64748b" font-family="Arial,Helvetica,sans-serif">Tram approaching from your left</text>
</svg>
