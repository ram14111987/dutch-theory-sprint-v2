<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-label="Top-down view of an uncontrolled crossroads">
  <title>Uncontrolled crossroads</title>
  <!-- background -->
  <rect width="260" height="260" fill="#f8fafc"/>
  <!-- corner pavement blocks -->
  <rect x="0"   y="0"   width="95"  height="95"  fill="#e2e8f0"/>
  <rect x="165" y="0"   width="95"  height="95"  fill="#e2e8f0"/>
  <rect x="0"   y="165" width="95"  height="95"  fill="#e2e8f0"/>
  <rect x="165" y="165" width="95"  height="95"  fill="#e2e8f0"/>
  <!-- road surfaces -->
  <rect x="95"  y="0"   width="70"  height="260" fill="#94a3b8"/>
  <rect x="0"   y="95"  width="260" height="70"  fill="#94a3b8"/>
  <!-- centre dashes — vertical road -->
  <line x1="130" y1="10"  x2="130" y2="88"  stroke="#fff" stroke-width="2" stroke-dasharray="10 8"/>
  <line x1="130" y1="172" x2="130" y2="250" stroke="#fff" stroke-width="2" stroke-dasharray="10 8"/>
  <!-- centre dashes — horizontal road -->
  <line x1="10"  y1="130" x2="88"  y2="130" stroke="#fff" stroke-width="2" stroke-dasharray="10 8"/>
  <line x1="172" y1="130" x2="250" y2="130" stroke="#fff" stroke-width="2" stroke-dasharray="10 8"/>

  <!-- YOUR CAR: blue, heading north (up), bottom of vertical road -->
  <rect x="108" y="193" width="44" height="26" rx="4" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="116" y="197" width="28" height="10" rx="2" fill="#bfdbfe"/>
  <polygon points="130,174 116,195 144,195" fill="#1d4ed8"/>
  <text x="130" y="254" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b" font-family="Arial,Helvetica,sans-serif">YOU</text>

  <!-- OTHER CAR: red, heading west (left), right side of horizontal road -->
  <rect x="192" y="108" width="26" height="44" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
  <rect x="196" y="116" width="10" height="28" rx="2" fill="#fecaca"/>
  <polygon points="174,130 194,116 194,144" fill="#b91c1c"/>
  <text x="233" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#ef4444" font-family="Arial,Helvetica,sans-serif">ON YOUR</text>
  <text x="233" y="131" text-anchor="middle" font-size="10" font-weight="bold" fill="#ef4444" font-family="Arial,Helvetica,sans-serif">RIGHT</text>

  <!-- caption -->
  <text x="130" y="14" text-anchor="middle" font-size="9" fill="#64748b" font-family="Arial,Helvetica,sans-serif">No signs, no markings</text>
</svg>
