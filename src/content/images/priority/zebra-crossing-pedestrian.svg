<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" role="img" aria-labelledby="title">
  <title id="title">A car slows for a pedestrian about to step onto a marked zebra crossing</title>
  <rect width="480" height="260" fill="#f4f6fa"/>
  <rect x="0" y="80" width="480" height="100" fill="#dfe7f5"/>
  <g id="zebra">
    <rect x="210" y="80" width="20" height="100" fill="#ffffff"/>
    <rect x="240" y="80" width="20" height="100" fill="#ffffff"/>
    <rect x="270" y="80" width="20" height="100" fill="#ffffff"/>
  </g>
  <g id="car">
    <rect x="60" y="105" width="60" height="34" rx="7" fill="#1565c0"/>
    <text x="90" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">YOU</text>
    <path d="M130 122 L190 122" fill="none" stroke="#d32f2f" stroke-width="3"/>
    <path d="M190 122 L180 116 M190 122 L180 128" fill="none" stroke="#d32f2f" stroke-width="3"/>
    <text x="160" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d32f2f">slow</text>
  </g>
  <g id="pedestrian">
    <circle cx="250" cy="196" r="8" fill="#2e7d32"/>
    <rect x="244" y="204" width="12" height="24" rx="4" fill="#2e7d32"/>
  </g>
  <text x="240" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#222">Pedestrian about to cross has priority</text>
</svg>
