<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 268" role="img" aria-labelledby="title">
  <title id="title">A car entering a Dutch roundabout gives way to traffic already circulating on the ring</title>
  <rect width="260" height="268" fill="#f8fafc"/>
  <rect x="100" y="172" width="60" height="88" fill="#94a3b8"/>
  <rect x="100" y="0"   width="60" height="88" fill="#94a3b8"/>
  <rect x="0"   y="100" width="88" height="60" fill="#94a3b8"/>
  <rect x="172" y="100" width="88" height="60" fill="#94a3b8"/>
  <circle cx="130" cy="130" r="78" fill="#94a3b8"/>
  <circle cx="130" cy="130" r="44" fill="#c7d2e0"/>
  <circle cx="130" cy="130" r="40" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5"/>
  <path d="M 130,58 A 72,72 0 0,1 196,168" stroke="#fff" stroke-width="3" fill="none" stroke-dasharray="12 8"/>
  <polygon points="196,168 182,162 193,152" fill="#fff"/>
  <polygon points="100,174 107,168 114,174" fill="#fff"/>
  <polygon points="114,174 121,168 128,174" fill="#fff"/>
  <polygon points="128,174 135,168 142,174" fill="#fff"/>
  <polygon points="142,174 149,168 156,174" fill="#fff"/>
  <rect x="174" y="109" width="26" height="40" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
  <rect x="178" y="113" width="18" height="10" rx="2" fill="#fecaca"/>
  <rect x="109" y="196" width="42" height="26" rx="4" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="116" y="200" width="28" height="10" rx="2" fill="#bfdbfe"/>
  <text x="130" y="262" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b" font-family="Arial,Helvetica,sans-serif">YOU — give way</text>
  <text x="218" y="122" text-anchor="start" font-size="9" font-weight="bold" fill="#ef4444" font-family="Arial,Helvetica,sans-serif">ON RING</text>
  <text x="218" y="133" text-anchor="start" font-size="9" font-weight="bold" fill="#ef4444" font-family="Arial,Helvetica,sans-serif">PRIORITY</text>
</svg>
