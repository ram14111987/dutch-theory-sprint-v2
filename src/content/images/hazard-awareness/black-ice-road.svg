<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 160" role="img" aria-label="Road surface showing conditions typical of black ice: near-zero temperature and a subtle sheen">
  <title>Black ice warning — near-zero temperature with road sheen</title>
  <!-- background -->
  <rect width="300" height="160" fill="#f8fafc"/>
  <!-- pavement strips -->
  <rect x="0" y="0"   width="300" height="32" fill="#e2e8f0"/>
  <rect x="0" y="128" width="300" height="32" fill="#e2e8f0"/>
  <!-- road surface (dark, slightly glossy look) -->
  <rect x="0" y="32" width="300" height="96" fill="#64748b"/>
  <!-- subtle sheen band — diagonal highlight to suggest glossiness / ice -->
  <polygon points="60,32 120,32 90,128 30,128" fill="white" opacity="0.12"/>
  <polygon points="150,32 210,32 180,128 120,128" fill="white" opacity="0.10"/>
  <polygon points="230,32 280,32 260,128 210,128" fill="white" opacity="0.08"/>
  <!-- road centre dash -->
  <line x1="10" y1="80" x2="290" y2="80" stroke="#94a3b8" stroke-width="2" stroke-dasharray="20 14"/>

  <!-- THERMOMETER — left side -->
  <!-- bulb -->
  <circle cx="48" cy="112" r="13" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
  <!-- stem -->
  <rect x="43" y="42" width="10" height="72" rx="5" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- mercury column near 0 -->
  <rect x="45" y="95" width="6" height="20" rx="3" fill="#ef4444"/>
  <!-- tick marks -->
  <line x1="53" y1="50" x2="58" y2="50" stroke="#64748b" stroke-width="1.5"/>
  <line x1="53" y1="65" x2="58" y2="65" stroke="#64748b" stroke-width="1.5"/>
  <line x1="53" y1="80" x2="62" y2="80" stroke="#64748b" stroke-width="2"/>
  <line x1="53" y1="95" x2="58" y2="95" stroke="#64748b" stroke-width="1.5"/>
  <!-- 0°C label -->
  <text x="66" y="84" font-size="11" fill="#f8fafc" font-family="Arial,Helvetica,sans-serif" font-weight="bold">0°C</text>
  <!-- temperature reading -->
  <text x="48" y="138" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b" font-family="Arial,Helvetica,sans-serif">−1°C</text>

  <!-- SNOWFLAKE — centre of road -->
  <g transform="translate(150,80)">
    <!-- 6 arms -->
    <line x1="0" y1="-22" x2="0"   y2="22"  stroke="#bfdbfe" stroke-width="2.5"/>
    <line x1="-19" y1="-11" x2="19" y2="11"  stroke="#bfdbfe" stroke-width="2.5"/>
    <line x1="-19" y1="11"  x2="19" y2="-11" stroke="#bfdbfe" stroke-width="2.5"/>
    <!-- small cross bars -->
    <line x1="-6" y1="-16" x2="6" y2="-16" stroke="#bfdbfe" stroke-width="1.5"/>
    <line x1="-6" y1="16"  x2="6" y2="16"  stroke="#bfdbfe" stroke-width="1.5"/>
    <line x1="-20" y1="-6" x2="-20" y2="6"  stroke="#bfdbfe" stroke-width="1.5"/>
    <line x1="20"  y1="-6" x2="20"  y2="6"  stroke="#bfdbfe" stroke-width="1.5"/>
  </g>

  <!-- WARNING text right side -->
  <text x="240" y="62"  text-anchor="middle" font-size="12" font-weight="bold" fill="#fef9c3" font-family="Arial,Helvetica,sans-serif">BLACK</text>
  <text x="240" y="77"  text-anchor="middle" font-size="12" font-weight="bold" fill="#fef9c3" font-family="Arial,Helvetica,sans-serif">ICE</text>
  <text x="240" y="92"  text-anchor="middle" font-size="10" fill="#e2e8f0" font-family="Arial,Helvetica,sans-serif">RISK</text>
  <!-- SHEEN label -->
  <text x="240" y="108" text-anchor="middle" font-size="9" fill="#cbd5e1" font-family="Arial,Helvetica,sans-serif">road looks dry</text>
  <text x="240" y="120" text-anchor="middle" font-size="9" fill="#cbd5e1" font-family="Arial,Helvetica,sans-serif">but has a sheen</text>

  <text x="150" y="150" text-anchor="middle" font-size="9" fill="#64748b" font-family="Arial,Helvetica,sans-serif">Dry-looking but shiny surface near 0 °C — suspect black ice</text>
</svg>
