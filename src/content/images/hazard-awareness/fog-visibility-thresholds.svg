<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-labelledby="title">
  <title id="title">Front fog lights are allowed when visibility drops below 200 metres, rear fog lights only below 50 metres</title>
  <rect width="480" height="200" fill="#eef1f5"/>
  <text x="240" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#222">Fog light thresholds (visibility)</text>
  <line x1="40" y1="120" x2="440" y2="120" stroke="#222" stroke-width="2"/>
  <line x1="180" y1="112" x2="180" y2="128" stroke="#222" stroke-width="2"/>
  <line x1="340" y1="112" x2="340" y2="128" stroke="#222" stroke-width="2"/>
  <text x="180" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#222">50 m</text>
  <text x="340" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#222">200 m</text>
  <rect x="40" y="70" width="140" height="20" fill="#c62828"/>
  <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">front + rear fog</text>
  <rect x="180" y="70" width="160" height="20" fill="#ef6c00"/>
  <text x="260" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">front fog only</text>
  <rect x="340" y="70" width="100" height="20" fill="#90a4ae"/>
  <text x="390" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">no fog lights</text>
  <text x="240" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#222">At 80 m: dipped headlights + front fog; rear fog not yet allowed</text>
</svg>
