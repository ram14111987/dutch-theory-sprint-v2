<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="480" height="220" role="img" aria-labelledby="title">
  <title id="title">Two-second following distance rule, doubled to four seconds in wet conditions</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>
  <rect width="480" height="220" fill="#f4f6fa"/>
  <text x="240" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#222">The 2-second rule (double in wet)</text>
  <g id="base">
    <rect x="20" y="80" width="440" height="80" fill="#dfe7f5" stroke="#7a8aa8" stroke-width="2"/>
    <line x1="240" y1="80" x2="240" y2="160" stroke="#ffffff" stroke-width="2" stroke-dasharray="8 8"/>
  </g>
  <g id="layer-dry">
    <rect x="60" y="100" width="60" height="40" rx="6" fill="#1565c0"/>
    <rect x="160" y="100" width="60" height="40" rx="6" fill="#ef6c00"/>
    <text x="90" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">You</text>
    <text x="190" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">Ahead</text>
    <path d="M120 175 L160 175" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="140" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#222">2 s gap (dry)</text>
  </g>
  <g id="layer-wet">
    <rect x="300" y="100" width="40" height="40" rx="6" fill="#1565c0"/>
    <rect x="420" y="100" width="40" height="40" rx="6" fill="#ef6c00"/>
    <text x="320" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">You</text>
    <path d="M340 175 L420 175" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="380" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#222">4 s gap (wet)</text>
  </g>
</svg>
